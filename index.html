<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input  class="cityInput" type="text" placeholder="enter city name" spellcheck="false">
            <button ><img src="images/search.png" alt=""></button>
        </div>
            <div class="error">
                <p>City not found</p>
            </div>
        <div class="weather"><img src="images/rain.png" class="weather-icon">
        
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" >

                    <div>
                        <p class="humidity">50%</p>
                        <p>humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" >
                    <div>
                        <p class="wind">15km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
      </div>
    </div>
    
    <script>
        


        const apiKey = "6e02caab56ae2377718e9038cff2fac2";
        const apiUrl = `https://api.openweathermap.org/data/2.5/weather?units=metric&q=`
      
        const searchBox = document.querySelector(".search input")
        const searchButton = document.querySelector(".search button")
         

        async function checkWeather(city) {
            const response = await fetch(apiUrl + city + `&appid=${apiKey} `);
            var data = await response.json()
            if (data.cod == 404) {
                document.querySelector(".error").style.display = "block";
                
            }else{
                document.querySelector(".error").style.display = "none";
            }
          console.log(data)

            document.querySelector(".city").textContent = data.name;
            document.querySelector(".temp").textContent = Math.round(data.main.temp) + "°C";
            document.querySelector(".humidity").textContent = data.main.humidity +"%";
            document.querySelector(".wind").textContent = Math.round(data.wind.speed)+" km/h";

            
            const weer = data.weather[0].main

           console.log(weer)

            if (weer !="" ) {
                document.querySelector(".weather-icon").src = `images/${weer}.png`
            }
           
            
           

        }


        checkWeather("amsterdam")

        searchButton.addEventListener("click", ()=>{
            checkWeather(searchBox.value)
        })
        


    </script>
</body>
</html>
